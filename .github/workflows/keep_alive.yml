name: Keep Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Every 14 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -f https://rizqaratech-backend.onrender.com/health || echo "Ping failed"
